<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Semantic Tokens</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 22px 26px; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 6px 0; font-family: var(--font-mono); font-size: 11px; vertical-align: middle; }
  td.token { color: var(--fg); width: 36%; }
  td.maps { color: var(--fg-muted); width: 32%; }
  td.demo { width: 32%; }
  .swatch { display: inline-block; width: 80px; height: 22px; border: 1px solid var(--border); vertical-align: middle; }
  .text-demo { padding: 2px 8px; display: inline-block; }
</style>
</head>
<body>
<div class="card tight">
  <div class="label">Semantic mapping</div>
  <table>
    <tr><td class="token">--bg</td><td class="maps">→ bone-100</td><td class="demo"><span class="swatch" style="background:#F5EFE4"></span></td></tr>
    <tr><td class="token">--bg-inverted</td><td class="maps">→ carbon-900</td><td class="demo"><span class="swatch" style="background:#0A0908"></span></td></tr>
    <tr><td class="token">--fg</td><td class="maps">→ carbon-900</td><td class="demo"><span class="text-demo" style="background:#F5EFE4;color:#0A0908;font-family:var(--font-display-alt)">AaBb</span></td></tr>
    <tr><td class="token">--fg-muted</td><td class="maps">→ carbon-500</td><td class="demo"><span class="text-demo" style="background:#F5EFE4;color:#3A3631;font-family:var(--font-display-alt)">AaBb</span></td></tr>
    <tr><td class="token">--accent</td><td class="maps">→ blood-600</td><td class="demo"><span class="swatch" style="background:#B0291F"></span></td></tr>
    <tr><td class="token">--border-strong</td><td class="maps">→ carbon-900</td><td class="demo"><span class="swatch" style="background:#F5EFE4;border:2px solid #0A0908"></span></td></tr>
  </table>
</div>
</body>
</html>
