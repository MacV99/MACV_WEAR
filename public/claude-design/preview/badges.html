<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Badges & Tags</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 22px 26px; gap: 14px; justify-content: center; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .badge {
    font-family: var(--font-mono); font-weight: 700; font-size: 10px;
    letter-spacing: 0.16em; text-transform: uppercase;
    padding: 5px 10px; border-radius: 2px;
    background: var(--carbon-900); color: var(--bone-50);
  }
  .badge.blood { background: var(--blood-600); }
  .badge.olive { background: var(--olive-600); }
  .badge.outline { background: transparent; color: var(--carbon-900); border: 1.5px solid var(--carbon-900); }
  .badge.bone { background: var(--bone-200); color: var(--carbon-900); }
  .size-pill {
    font-family: var(--font-display-alt); font-size: 13px;
    width: 36px; height: 36px; border-radius: 999px;
    border: 1.5px solid var(--carbon-900);
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--bone-50); color: var(--carbon-900);
    cursor: pointer;
  }
  .size-pill.on { background: var(--carbon-900); color: var(--bone-50); }
  .size-pill.off { opacity: 0.3; text-decoration: line-through; }
</style>
</head>
<body>
<div class="card tight">
  <div class="row">
    <span class="badge">Nuevo</span>
    <span class="badge blood">2x1 · ÚLTIMOS DÍAS</span>
    <span class="badge olive">Edición limitada</span>
    <span class="badge outline">Pima 100%</span>
    <span class="badge bone">Drop 03</span>
  </div>
  <div class="row">
    <span class="size-pill">XS</span>
    <span class="size-pill">S</span>
    <span class="size-pill on">M</span>
    <span class="size-pill">L</span>
    <span class="size-pill off">XL</span>
  </div>
</div>
</body>
</html>
