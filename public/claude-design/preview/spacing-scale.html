<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Spacing Scale</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 20px 26px; gap: 8px; justify-content: center; }
  .row { display: grid; grid-template-columns: 60px 1fr 60px; align-items: center; gap: 12px; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg); letter-spacing: 0.06em; }
  .bar { height: 12px; background: var(--carbon-900); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); text-align: right; }
</style>
</head>
<body>
<div class="card tight">
  <div class="row"><div class="tok">--space-1</div><div><div class="bar" style="width:4px"></div></div><div class="px">4 px</div></div>
  <div class="row"><div class="tok">--space-2</div><div><div class="bar" style="width:8px"></div></div><div class="px">8 px</div></div>
  <div class="row"><div class="tok">--space-3</div><div><div class="bar" style="width:12px"></div></div><div class="px">12 px</div></div>
  <div class="row"><div class="tok">--space-4</div><div><div class="bar" style="width:16px"></div></div><div class="px">16 px</div></div>
  <div class="row"><div class="tok">--space-5</div><div><div class="bar" style="width:24px"></div></div><div class="px">24 px</div></div>
  <div class="row"><div class="tok">--space-6</div><div><div class="bar" style="width:32px"></div></div><div class="px">32 px</div></div>
  <div class="row"><div class="tok">--space-7</div><div><div class="bar" style="width:48px"></div></div><div class="px">48 px</div></div>
  <div class="row"><div class="tok">--space-8</div><div><div class="bar" style="width:64px"></div></div><div class="px">64 px</div></div>
</div>
</body>
</html>
