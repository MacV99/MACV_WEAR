<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Type Scale</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 20px 26px; gap: 6px; justify-content: center; }
  .row { display: grid; grid-template-columns: 70px 1fr 110px; align-items: baseline; gap: 14px; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .sample { line-height: 1; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); text-align: right; letter-spacing: 0.04em; }
  .h1 { font-family: var(--font-display); font-size: 44px; text-transform: uppercase; line-height: 0.92; }
  .h2 { font-family: var(--font-display); font-size: 32px; text-transform: uppercase; }
  .h3 { font-family: var(--font-display-alt); font-weight: 900; font-size: 22px; text-transform: uppercase; }
  .h4 { font-family: var(--font-body); font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.04em; }
  .body { font-family: var(--font-body); font-size: 14px; }
</style>
</head>
<body>
<div class="card tight">
  <div class="row"><div class="tag">H1</div><div class="sample h1">Bóxers que no te fallan</div><div class="meta">Anton · 44</div></div>
  <div class="row"><div class="tag">H2</div><div class="sample h2">Colección esencial</div><div class="meta">Anton · 32</div></div>
  <div class="row"><div class="tag">H3</div><div class="sample h3">Algodón pima 100%</div><div class="meta">Archivo Black · 22</div></div>
  <div class="row"><div class="tag">H4</div><div class="sample h4">AÑADIR AL CARRITO</div><div class="meta">Archivo 700 · 14</div></div>
  <div class="row"><div class="tag">Body</div><div class="sample body">Costuras planas, fit que aguanta el día.</div><div class="meta">Archivo · 14</div></div>
</div>
</body>
</html>
