<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Logo — Stamp</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .card { justify-content: center; align-items: center; padding: 16px; }
  .stage {
    width: 100%; height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .tile {
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    height: 100%;
    min-height: 110px;
  }
  .tile.bone { background: var(--bone-100); }
  .tile.carbon { background: var(--carbon-900); }
  .tile img { max-width: 70%; max-height: 80%; object-fit: contain; }
  .tile.carbon img { filter: invert(1); }
</style>
</head>
<body>
<div class="card tight">
  <div class="stage">
    <div class="tile bone"><img src="../assets/logo-mark.png" alt="Stamp on bone" /></div>
    <div class="tile carbon"><img src="../assets/logo-mark.png" alt="Stamp on carbon" /></div>
  </div>
</div>
</body>
</html>
