<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Iconography</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 20px 22px; gap: 12px; justify-content: center; }
  .row { display: flex; gap: 22px; align-items: center; flex-wrap: wrap; }
  .icon-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .icon-cell svg { color: var(--carbon-900); }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--fg-muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .glyph-row { display: flex; gap: 18px; align-items: center; padding-top: 8px; border-top: 1px solid var(--border); }
  .glyph { font-family: var(--font-display-alt); font-weight: 900; font-size: 22px; min-width: 24px; text-align: center; }
  .source { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="card tight">
  <div class="row">
    <!-- Lucide stroke icons, hand-inlined for offline preview -->
    <div class="icon-cell">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="square" stroke-linejoin="miter"><path d="M6 2l1.5 4h9L18 2"/><path d="M3 6h18l-2 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L3 6z"/></svg>
      <div class="lbl">Bag</div>
    </div>
    <div class="icon-cell">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="square"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <div class="lbl">Search</div>
    </div>
    <div class="icon-cell">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="square"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <div class="lbl">Account</div>
    </div>
    <div class="icon-cell">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="square"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.5 8.5 8.5 0 0 1-7.6-4.7L3 21l1.6-4.3A8.5 8.5 0 1 1 21 11.5z"/></svg>
      <div class="lbl">Support</div>
    </div>
    <div class="icon-cell">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="square"><rect x="3" y="6" width="18" height="13"/><path d="M3 10h18M8 6V4M16 6V4"/></svg>
      <div class="lbl">Order</div>
    </div>
    <div class="icon-cell">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="square"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      <div class="lbl">Next</div>
    </div>
  </div>
  <div class="glyph-row">
    <span class="glyph">×</span>
    <span class="glyph">+</span>
    <span class="glyph">−</span>
    <span class="glyph">›</span>
    <span class="glyph">‹</span>
    <span class="source" style="margin-left:auto">Lucide · 1.75 stroke · square caps</span>
  </div>
</div>
</body>
</html>
