<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Body & Mono</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 20px 26px; gap: 14px; justify-content: center; }
  .block { display: flex; flex-direction: column; gap: 4px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.18em; text-transform: uppercase; }
  .body { font-family: var(--font-body); font-size: 15px; line-height: 1.5; max-width: 88%; }
  .mono { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; }
  .eyebrow { font-family: var(--font-mono); font-weight: 700; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card tight">
  <div class="block">
    <div class="tag">Body · Archivo</div>
    <div class="body">Algodón pima 100%, costuras planas, elástico jacquard tejido en el mismo telar. Hecho para aguantar el día sin que te acuerdes de él.</div>
  </div>
  <div class="block">
    <div class="tag">Eyebrow / Micro · JetBrains Mono</div>
    <div class="eyebrow">Edición limitada · Drop 03</div>
    <div class="mono">Pedido #MW-04812 · 2025-11-04</div>
  </div>
</div>
</body>
</html>
