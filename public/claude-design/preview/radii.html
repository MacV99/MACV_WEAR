<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Radii & Borders</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 20px 26px; gap: 14px; justify-content: center; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .demo { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 64px; height: 64px; background: var(--bone-200); border: 2px solid var(--carbon-900); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .val { font-family: var(--font-display-alt); font-size: 13px; }
</style>
</head>
<body>
<div class="card tight">
  <div class="label">Corner radii — square is the default</div>
  <div class="grid">
    <div class="demo"><div class="box" style="border-radius:0"></div><div class="val">0</div><div class="lbl">Default</div></div>
    <div class="demo"><div class="box" style="border-radius:2px"></div><div class="val">2 px</div><div class="lbl">Chips</div></div>
    <div class="demo"><div class="box" style="border-radius:999px"></div><div class="val">Pill</div><div class="lbl">Size selector only</div></div>
    <div class="demo"><div class="box" style="border-radius:50%"></div><div class="val">Circle</div><div class="lbl">Avatar</div></div>
  </div>
</div>
</body>
</html>
