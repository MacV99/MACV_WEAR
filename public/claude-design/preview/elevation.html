<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Elevation</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 22px 26px; gap: 14px; justify-content: center; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .demo { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 76px; height: 56px; background: var(--bone-50); }
  .b1 { border: 1px solid rgba(10,9,8,0.14); }
  .b2 { border: 2px solid var(--carbon-900); }
  .b3 { border: 2px solid var(--carbon-900); box-shadow: 4px 4px 0 var(--carbon-900); }
  .b4 { border: 1px solid rgba(10,9,8,0.14); box-shadow: 0 1px 0 rgba(10,9,8,0.08), 0 4px 12px rgba(10,9,8,0.06); }
  .name { font-family: var(--font-display-alt); font-size: 12px; text-transform: uppercase; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.06em; text-align: center; max-width: 110px; }
</style>
</head>
<body>
<div class="card tight">
  <div class="label">Elevation — letterpress, not glow</div>
  <div class="grid">
    <div class="demo"><div class="box b1"></div><div class="name">Hairline</div><div class="lbl">Soft division</div></div>
    <div class="demo"><div class="box b2"></div><div class="name">Carbon</div><div class="lbl">Card border</div></div>
    <div class="demo"><div class="box b3"></div><div class="name">Press</div><div class="lbl">Primary CTA</div></div>
    <div class="demo"><div class="box b4"></div><div class="name">Soft</div><div class="lbl">Product card hover</div></div>
  </div>
</div>
</body>
</html>
