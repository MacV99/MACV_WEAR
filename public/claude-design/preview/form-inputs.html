<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Form Inputs</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 22px 26px; gap: 12px; justify-content: center; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.16em; text-transform: uppercase; }
  .input {
    font-family: var(--font-body); font-size: 14px;
    padding: 10px 12px;
    background: var(--bone-50);
    border: 1.5px solid var(--carbon-900);
    border-radius: 0; outline: none;
    color: var(--fg);
  }
  .input:focus { box-shadow: inset 0 0 0 2px var(--carbon-900); }
  .input.focus { box-shadow: inset 0 0 0 2px var(--carbon-900); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .help { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.04em; }
  .err { color: var(--blood-600); }
</style>
</head>
<body>
<div class="card tight">
  <div class="row">
    <div class="field">
      <div class="lab">Email</div>
      <input class="input" value="hola@macv.co" />
    </div>
    <div class="field">
      <div class="lab">Talla</div>
      <input class="input focus" value="M" />
    </div>
  </div>
  <div class="row">
    <div class="field">
      <div class="lab">Cantidad</div>
      <input class="input" value="1" />
    </div>
    <div class="field">
      <div class="lab err">Cupón</div>
      <input class="input" style="border-color:var(--blood-600); color:var(--blood-700)" value="DROP25" />
      <div class="help err">Cupón vencido.</div>
    </div>
  </div>
</div>
</body>
</html>
