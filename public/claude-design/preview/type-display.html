<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Display Type</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 20px 26px; gap: 6px; justify-content: center; }
  .specimen { font-family: var(--font-display); font-size: 96px; line-height: 0.86; text-transform: uppercase; letter-spacing: -0.005em; }
  .meta { display: flex; justify-content: space-between; align-items: baseline; padding-top: 8px; border-top: 1px solid var(--border); }
  .meta .name { font-family: var(--font-display-alt); font-size: 14px; text-transform: uppercase; }
  .meta .spec { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="card">
  <div class="specimen">MACV WEAR</div>
  <div class="meta">
    <div class="name">Anton · Display</div>
    <div class="spec">96 / 0.86 · uppercase</div>
  </div>
</div>
</body>
</html>
