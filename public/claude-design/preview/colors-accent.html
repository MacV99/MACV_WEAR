<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Accent Colors</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 22px 26px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; flex: 1; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { aspect-ratio: 1; border: 1px solid var(--border); }
  .name { font-family: var(--font-display-alt); font-size: 13px; text-transform: uppercase; letter-spacing: 0.02em; }
  .role { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card">
  <div class="label">Accent · use sparingly</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#B0291F"></div><div class="name">Blood 600</div><div class="role">Sale · alert</div><div class="hex">#B0291F</div></div>
    <div class="sw"><div class="chip" style="background:#8C1E16"></div><div class="name">Blood 700</div><div class="role">Pressed</div><div class="hex">#8C1E16</div></div>
    <div class="sw"><div class="chip" style="background:#5A5A2E"></div><div class="name">Olive 600</div><div class="role">Utility</div><div class="hex">#5A5A2E</div></div>
    <div class="sw"><div class="chip" style="background:#3F3F1F"></div><div class="name">Olive 700</div><div class="role">Pressed</div><div class="hex">#3F3F1F</div></div>
  </div>
</div>
</body>
</html>
