<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Buttons</title>
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 22px 26px; gap: 14px; justify-content: center; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn {
    font-family: var(--font-body); font-weight: 700;
    font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 12px 22px;
    background: var(--carbon-900); color: var(--bone-50);
    border: 2px solid var(--carbon-900); cursor: pointer;
    box-shadow: 4px 4px 0 var(--carbon-900);
    transition: transform 120ms ease-out, box-shadow 120ms ease-out;
  }
  .btn.ghost { background: transparent; color: var(--carbon-900); box-shadow: none; }
  .btn.blood { background: var(--blood-600); border-color: var(--blood-600); box-shadow: 4px 4px 0 var(--carbon-900); }
  .btn.sm { font-size: 11px; padding: 8px 14px; box-shadow: 2px 2px 0 var(--carbon-900); }
  .btn.disabled { opacity: 0.4; cursor: not-allowed; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.12em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="card tight">
  <div class="label">Primary · Ghost · Blood · Small · Disabled</div>
  <div class="row">
    <button class="btn">Comprar</button>
    <button class="btn ghost">Ver más</button>
    <button class="btn blood">Últimas unidades</button>
    <button class="btn sm">Añadir</button>
    <button class="btn disabled">Agotado</button>
  </div>
  <div class="lbl">Press shadow drops on :active — translate (2px, 2px)</div>
</div>
</body>
</html>
